<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/LogoSIU.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Someone Is Unbeatable – The ultimate challenge game." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://someoneisunbeatable.de/" />
    <meta property="og:title" content="SIU – Someone Is Unbeatable" />
    <meta property="og:description" content="Someone Is Unbeatable – The ultimate challenge game." />
    <meta property="og:image" content="https://someoneisunbeatable.de/og-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / WhatsApp -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SIU – Someone Is Unbeatable" />
    <meta name="twitter:description" content="Someone Is Unbeatable – The ultimate challenge game." />
    <meta name="twitter:image" content="https://someoneisunbeatable.de/og-share.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-render-blocking font load: print→all swap trick -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet" /></noscript>
    <title>SIU</title>
  </head>
  <body style="margin:0;min-width:320px;min-height:100vh;background:var(--footer-bg,#f9fafb);">
    <div id="root" style="display:flex;flex-direction:column;min-height:100vh;background:var(--footer-bg,#f9fafb);">
      <main style="flex:1;">
        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 0.75rem;
          min-height: 60vh;
          width: 100%;
        ">
          <svg xmlns="http://www.w3.org/2000/svg"
            width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="
              color: var(--primary,#4f46e5);
              animation: spin 1s linear infinite;
              width: 2rem;
              height: 2rem;
              display: block;
            "
            aria-hidden="true"
          >
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
          </svg>
          <p style="
            color: var(--muted-foreground,#6b7280);
            font-size: 0.875rem;
            margin: 0;
          ">Loading…</p>
        </div>
      </main>
      <div style="width:100%;height:63px;border-top:1px solid var(--footer-border,#e5e7eb);background:var(--footer-bg,#f9fafb);"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      :root {
        --primary: #4f46e5;
        --muted-foreground: #6b7280;
        --footer-bg: #f9fafb;
        --footer-border: #e5e7eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --primary: #818cf8;
          --muted-foreground: #9ca3af;
          --footer-bg: #0f172a;
          --footer-border: #1e293b;
        }
      }
    </style>
  </body>
</html>
