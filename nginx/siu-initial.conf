# Initial HTTP-only config (use this BEFORE obtaining SSL certificates)
# Once certbot generates certs, switch to siu.conf

# Frontend: someoneisunbeatable.de / www.someoneisunbeatable.de
server {
    listen 80;
    listen [::]:80;
    server_name someoneisunbeatable.de www.someoneisunbeatable.de;

    # Allow certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# API: api.someoneisunbeatable.de
server {
    listen 80;
    listen [::]:80;
    server_name api.someoneisunbeatable.de;

    # Allow certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
