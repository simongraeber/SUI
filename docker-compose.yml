services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siu
      POSTGRES_PASSWORD: siu
      POSTGRES_DB: siu
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siu"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://siu:siu@postgres:5432/siu
      DATABASE_URL_READONLY: postgresql+asyncpg://siu_readonly:siu_readonly@postgres:5432/siu
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGINS: '["http://localhost","http://localhost:5173"]'
    volumes:
      - images:/data/images
      - team_images:/data/team_images
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  images:
  team_images: