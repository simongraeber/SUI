services:
  postgres:
    image: postgres:16-alpine
    container_name: siu-postgres
    environment:
      POSTGRES_USER: siu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: siu
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siu"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: siu-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://siu:${POSTGRES_PASSWORD}@postgres:5432/siu
      DATABASE_URL_READONLY: postgresql+asyncpg://siu_readonly:${POSTGRES_READONLY_PASSWORD}@postgres:5432/siu
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
    volumes:
      - images:/data/images
      - team_images:/data/team_images
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: siu-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  images:
  team_images:
